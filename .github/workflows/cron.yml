name: Fetch News Feed

on:
  schedule:
    # Runs every 6 hours (4x/day) — minimal usage
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install only fetch dependencies
        run: npm install --no-save rss-parser dotenv

      - name: Fetch news
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Commit updated feed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/mock-feed.json
          git diff --cached --quiet || git commit -m "chore: auto-update news feed [skip ci]"
          git push
